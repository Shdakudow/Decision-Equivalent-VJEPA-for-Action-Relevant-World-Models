experiment:
  seed: 42
  method: vjepa
experiment_name: multistep_diagnostic

data:
  tasks: [reach-v3, button-press-v3, drawer-open-v3, door-open-v3, pick-place-v3]
  selected_tasks: [reach-v3, button-press-v3, drawer-open-v3]
  validation_fraction: 0.2
  encoded_path: data/metaworld_pilot_resnet18.npz

policy: {quality: strong, hidden_dim: 512, task_dim: 32}
predictor: {hidden_dim: 1024, stochastic_dim: 64, task_dim: 32, horizon: 5}
bjepa: {prior_type: empirical_task_gaussian}
runtime: {device: cuda, workers: 0, amp: true}
output: {dir: outputs/pilot}

closed_loop:
  source_experiment: cross_method_metaworld
  artifacts_dir: outputs/comparisons
  policy_seed: 7

diagnostic:
  methods: [bc_plus_vjepa, bc_plus_de_vjepa]
  seeds: [42, 1000, 10000]
  horizons: [1, 3, 5]
  batch_size: 512
  max_samples: null
  raw_output: results/multistep_diagnostic.csv
  summary_output: results/multistep_diagnostic_summary.csv
  table_output: tables/multistep_diagnostic_table.tex
  plots_dir: plots
