experiment: {seed: 42, method: vjepa}
experiment_name: cem_mpc_smoke

data:
  tasks: [reach-v3, button-press-v3, drawer-open-v3, door-open-v3, pick-place-v3]
  max_steps: 200
  image_size: 224
  camera: corner2
  encoded_path: data/metaworld_pilot_resnet18.npz

encoder: {name: resnet18_imagenet}
policy: {quality: strong, hidden_dim: 512, task_dim: 32}
predictor: {hidden_dim: 1024, stochastic_dim: 64, task_dim: 32, horizon: 1}
bjepa: {prior_type: empirical_task_gaussian}
runtime: {device: cuda, workers: 0, amp: true}
output: {dir: outputs/pilot}

closed_loop:
  tasks: [reach-v3]
  source_experiment: cross_method_metaworld
  artifacts_dir: outputs/comparisons
  methods: [bc_only, bc_plus_vjepa_cem, bc_plus_de_vjepa_cem]
  seeds: [42]
  policy_seed: 1000
  require_independent_policy: true
  visual_conditions: [clean]
  episodes_per_task_seed: 3
  max_episode_steps: 200
  environment_seed: 6026
  planner_type: cem_mpc
  planning_horizons: [3]
  planner_alphas: [0.1]
  population_size: 32
  elite_fraction: 0.1
  cem_iterations: 2
  action_noise_init_std: 0.25
  cem_min_std: 0.02
  planning_gamma: 0.95
  value_head_checkpoint_dir: checkpoints/value_head_smoke
  lambda_de: 0.01
  resume: true
  raw_output: results/cem_mpc_smoke_raw.csv
  summary_output: results/cem_mpc_smoke_runner_summary.csv
