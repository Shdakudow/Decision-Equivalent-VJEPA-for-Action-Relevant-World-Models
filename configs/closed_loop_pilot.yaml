experiment:
  seed: 42
  method: vjepa

data:
  tasks: [reach-v3, button-press-v3, drawer-open-v3, door-open-v3, pick-place-v3]
  max_steps: 200
  image_size: 224
  camera: corner2
  encoded_path: data/metaworld_pilot_resnet18.npz

encoder:
  name: resnet18_imagenet

policy:
  quality: strong
  hidden_dim: 512
  task_dim: 32

predictor:
  hidden_dim: 1024
  stochastic_dim: 64
  task_dim: 32
  horizon: 1

bjepa:
  prior_type: empirical_task_gaussian

runtime:
  device: cuda
  workers: 0
  amp: true

output:
  dir: outputs/pilot

closed_loop:
  tasks: [reach-v3, button-press-v3, drawer-open-v3]
  source_experiment: cross_method_metaworld
  artifacts_dir: outputs/comparisons
  methods: [bc_only, vjepa, de_vjepa]
  seeds: [42, 1000, 10000]
  policy_seed: 7
  require_independent_policy: true
  shifts: [clean, brightness, desaturation]
  episodes_per_condition: 5
  environment_seed: 2026
  lookahead_blend: 1.0
  output: results/closed_loop_pilot.csv
  summary_output: results/closed_loop_pilot_summary.csv
