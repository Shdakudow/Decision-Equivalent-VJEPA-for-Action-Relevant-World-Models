name: de_bjepa_policy_geometry
base_config: configs/pilot.yaml
archive_tasks:
  [reach-v3, button-press-v3, drawer-open-v3, door-open-v3, pick-place-v3]
tasks:
  [reach-v3, button-press-v3, drawer-open-v3, door-open-v3, pick-place-v3]
seeds: [42, 1000, 10000]
evaluator_seeds: [42, 1000, 10000]
shifts: [clean, brightness]
artifacts_dir: outputs/ablations
base_overrides:
  policy.weak_epochs: 2
  policy.weak_data_fraction: 0.2
conditions:
  - {name: bjepa, objective: bjepa, lambda_de: 0.0, bjepa_prior_type: empirical_task_gaussian, bjepa_loss_type: nll, reference_policy_type: none}
  - {name: de_bjepa_random, objective: de_bjepa, lambda_de: 0.01, bjepa_prior_type: empirical_task_gaussian, bjepa_loss_type: nll, reference_policy_type: random}
  - {name: de_bjepa_weak, objective: de_bjepa, lambda_de: 0.01, bjepa_prior_type: empirical_task_gaussian, bjepa_loss_type: nll, reference_policy_type: weak_bc}
  - {name: de_bjepa_strong, objective: de_bjepa, lambda_de: 0.01, bjepa_prior_type: empirical_task_gaussian, bjepa_loss_type: nll, reference_policy_type: strong_bc}
output:
  raw: results/de_bjepa_policy_geometry.csv
analysis:
  input: results/de_bjepa_policy_geometry.csv
  summary: results/de_bjepa_policy_geometry_summary.csv
  table: tables/de_bjepa_policy_geometry_table.tex
  plots_dir: plots
  plot_kind: bars
  plot_prefix: de_bjepa_policy_geometry
  baseline_method: bjepa
  pair_by_task: true
