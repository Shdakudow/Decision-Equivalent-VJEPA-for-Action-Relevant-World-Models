experiment:
  seed: 42
experiment_name: value_head

data:
  tasks: [reach-v3, button-press-v3, drawer-open-v3]
  archive_tasks: [reach-v3, button-press-v3, drawer-open-v3, door-open-v3, pick-place-v3]
  encoded_path: data/metaworld_pilot_resnet18.npz

runtime:
  device: cuda

value_head:
  seeds: [42, 1000, 10000]
  epochs: 30
  batch_size: 256
  hidden_dim: 256
  task_dim: 32
  learning_rate: 0.0003
  weight_decay: 0.0001
  validation_fraction: 0.2
  checkpoint_dir: checkpoints
  validation_output: results/value_head_validation.csv
  plot_output: plots/value_head_calibration.png
  table_output: tables/value_head_validation_table.tex
