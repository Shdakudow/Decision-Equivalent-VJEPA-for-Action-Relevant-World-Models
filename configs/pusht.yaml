experiment:
  seed: 42
  method: vjepa

data:
  tasks: [pusht]
  validation_fraction: 0.2
  raw_path: data/pusht_raw.npz
  encoded_path: data/pusht_resnet18.npz

encoder:
  name: resnet18_imagenet
  batch_size: 128

policy:
  quality: strong
  hidden_dim: 512
  task_dim: 32
  batch_size: 1024
  epochs: 30
  weak_epochs: 2
  learning_rate: 0.0003
  weight_decay: 0.00001

predictor:
  hidden_dim: 1024
  stochastic_dim: 64
  task_dim: 32
  horizon: 1
  batch_size: 512
  epochs: 50
  learning_rate: 0.0003
  weight_decay: 0.00001
  gradient_clip: 5.0
  use_actions: true
  architecture: mlp

loss:
  beta: 0.001
  decision_weight: 0.01
  epsilon0: 0.01
  uncertainty_scale: 0.05
  gamma: 0.95

bjepa:
  prior_type: empirical_task_gaussian
  loss_type: nll

evaluation:
  batch_size: 1024

runtime:
  device: cuda
  workers: 8
  amp: true

output:
  dir: outputs/pusht
