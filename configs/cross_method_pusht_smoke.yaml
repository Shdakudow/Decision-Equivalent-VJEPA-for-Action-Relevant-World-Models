name: cross_method_pusht_smoke
dataset_name: lerobot-pusht
base_config: configs/pusht.yaml
archive_tasks: [pusht]
tasks: [pusht]
seeds: [42]
evaluator_seeds: [1000]
shifts: [clean]
artifacts_dir: outputs/comparisons
base_overrides:
  runtime.workers: 0
  policy.epochs: 1
  policy.weak_epochs: 1
  predictor.epochs: 1
  predictor.max_batches: 2
conditions:
  - {name: persistence, objective: persistence, reference_policy_type: none}
  - {name: linear_dynamics, objective: vjepa, architecture: linear, reference_policy_type: none}
  - {name: no_action_vjepa, objective: vjepa, use_actions: false, reference_policy_type: none}
  - {name: cosine_jepa, objective: cosine_jepa, reference_policy_type: none}
  - {name: vjepa, objective: vjepa, reference_policy_type: none}
  - {name: action_mse, objective: hybrid_action_mse, lambda_de: 0.1, reference_policy_type: strong_bc}
  - {name: random_policy_kl, objective: hybrid, lambda_de: 0.01, reference_policy_type: random}
  - {name: weak_policy_kl, objective: hybrid, lambda_de: 0.01, reference_policy_type: weak_bc}
  - {name: de_vjepa, objective: hybrid, lambda_de: 0.01, reference_policy_type: strong_bc}
  - {name: bjepa, objective: bjepa, bjepa_prior_type: empirical_task_gaussian, bjepa_loss_type: nll, reference_policy_type: none}
  - {name: de_bjepa, objective: de_bjepa, lambda_de: 0.01, bjepa_prior_type: empirical_task_gaussian, bjepa_loss_type: nll, reference_policy_type: strong_bc}
output:
  raw: results/cross_method_pusht_smoke.csv
analysis:
  input: results/cross_method_pusht_smoke.csv
  summary: results/cross_method_pusht_smoke_summary.csv
  table: tables/cross_method_pusht_smoke_table.tex
  plots_dir: plots/cross_method_pusht_smoke
  plot_kind: bars
  plot_prefix: pusht_smoke
  baseline_method: persistence
  pair_by_task: true
