name: lambda_sweep
base_config: configs/pilot.yaml
archive_tasks:
  [reach-v3, button-press-v3, drawer-open-v3, door-open-v3, pick-place-v3]
tasks: [reach-v3, button-press-v3, drawer-open-v3]
seeds: [42, 1000, 10000]
evaluator_seeds: [42, 1000, 10000]
shifts: [clean, brightness]
artifacts_dir: outputs/ablations
conditions:
  - {name: latent_only, objective: vjepa, lambda: 0.0, reference_policy_type: none}
  - {name: hybrid_lambda_1e-4, objective: hybrid, lambda: 0.0001, reference_policy_type: strong}
  - {name: hybrid_lambda_1e-3, objective: hybrid, lambda: 0.001, reference_policy_type: strong}
  - {name: hybrid_lambda_1e-2, objective: hybrid, lambda: 0.01, reference_policy_type: strong}
  - {name: hybrid_lambda_3e-2, objective: hybrid, lambda: 0.03, reference_policy_type: strong}
  - {name: hybrid_lambda_1e-1, objective: hybrid, lambda: 0.1, reference_policy_type: strong}
output:
  raw: results/lambda_sweep.csv
analysis:
  input: results/lambda_sweep.csv
  summary: results/lambda_sweep_summary.csv
  table: tables/lambda_sweep_table.tex
  plots_dir: plots
  plot_kind: lambda
  baseline_method: latent_only
